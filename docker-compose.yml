"""
Docker configuration for NEXUS
"""
version: '3.8'

services:
  # Redis for short-term memory
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # NEXUS Agent
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-agent
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: n8n for workflow management
  # n8n:
  #   image: n8nio/n8n:latest
  #   container_name: nexus-n8n
  #   ports:
  #     - "5678:5678"
  #   environment:
  #     - DB_TYPE=postgres
  #     - DB_POSTGRESDB_DATABASE=n8n
  #     - DB_POSTGRESDB_HOST=postgres
  #     - DB_POSTGRESDB_USER=n8n
  #     - DB_POSTGRESDB_PASSWORD=nexus_secure_password
  #   depends_on:
  #     - postgres
  #   volumes:
  #     - n8n-data:/home/node/.n8n

volumes:
  redis-data:
  n8n-data:
